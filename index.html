<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05010d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pudava" />
  <meta name="description" content="Pudava - Royal Ethnic Wear. Handcrafted luxury fashion for the modern Indian." />
  <link rel="manifest" href="/manifest.json" />
  <title>Pudava | Royal Ethnic Wear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pudava: {
              bg: '#05010d',
              surface: '#0d041a',
              primary: '#ec4899',
              secondary: '#a855f7',
              accent: '#d946ef',
              glass: 'rgba(255, 255, 255, 0.02)',
              glassBorder: 'rgba(217, 70, 239, 0.12)',
            },
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          animation: {
            'reveal-text': 'revealText 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards',
            'fade-in-blur': 'fadeInBlur 0.6s ease-out forwards',
            'float-slow': 'float 8s ease-in-out infinite',
            'nebula-pulse': 'nebula 10s ease-in-out infinite',
            'scale-up': 'scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-down': 'slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'scale-pop': 'scalePop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'glow-pulse': 'glowPulse 2s ease-in-out infinite',
            'dock-bounce': 'dockBounce 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'shimmer': 'shimmer 1.5s ease-in-out infinite',
          },
          keyframes: {
            revealText: {
              '0%': { transform: 'translateY(100%)', clipPath: 'inset(0 0 100% 0)' },
              '100%': { transform: 'translateY(0)', clipPath: 'inset(0 0 0 0)' },
            },
            fadeInBlur: {
              '0%': { opacity: '0', filter: 'blur(12px)', transform: 'scale(0.97)' },
              '100%': { opacity: '1', filter: 'blur(0)', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-15px) rotate(0.5deg)' },
            },
            nebula: {
              '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
              '50%': { opacity: '0.5', transform: 'scale(1.05)' },
            },
            scaleUp: {
              '0%': { transform: 'scale(0.85)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(30px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideDown: {
              '0%': { transform: 'translateY(-20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideInRight: {
              '0%': { transform: 'translateX(100%)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            scalePop: {
              '0%': { transform: 'scale(0.5)', opacity: '0' },
              '60%': { transform: 'scale(1.05)', opacity: '1' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            glowPulse: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(236, 72, 153, 0.3)' },
              '50%': { boxShadow: '0 0 30px rgba(236, 72, 153, 0.5)' },
            },
            dockBounce: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.15)' },
              '100%': { transform: 'scale(1)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
          },
        },
      },
    }
  </script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #05010d;
      color: #f3f4f6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .nebula-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 20% 30%, rgba(236, 72, 153, 0.06), transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.06), transparent 35%);
      pointer-events: none;
    }

    .glass-panel {
      background: rgba(13, 4, 26, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    .orchid-gradient {
      background: linear-gradient(135deg, #f472b6 0%, #a855f7 100%);
    }

    .orchid-text-gradient {
      background: linear-gradient(to right, #f9a8d4, #d8b4fe);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .parallax-img {
      transition: transform 0.6s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .group:hover .parallax-img {
      transform: scale(1.06) translateY(-8px);
    }

    /* Staggered animations - supports up to 16 children */
    .stagger-in>* {
      animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .stagger-in>*:nth-child(1) { animation-delay: 0s; }
    .stagger-in>*:nth-child(2) { animation-delay: 0.06s; }
    .stagger-in>*:nth-child(3) { animation-delay: 0.12s; }
    .stagger-in>*:nth-child(4) { animation-delay: 0.18s; }
    .stagger-in>*:nth-child(5) { animation-delay: 0.24s; }
    .stagger-in>*:nth-child(6) { animation-delay: 0.30s; }
    .stagger-in>*:nth-child(7) { animation-delay: 0.36s; }
    .stagger-in>*:nth-child(8) { animation-delay: 0.42s; }
    .stagger-in>*:nth-child(9) { animation-delay: 0.48s; }
    .stagger-in>*:nth-child(10) { animation-delay: 0.54s; }
    .stagger-in>*:nth-child(11) { animation-delay: 0.60s; }
    .stagger-in>*:nth-child(12) { animation-delay: 0.66s; }
    .stagger-in>*:nth-child(n+13) { animation-delay: 0.72s; }

    /* Hide Scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .reveal-container {
      overflow: hidden;
    }

    .reveal-item {
      display: inline-block;
      animation: revealText 0.8s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    /* Button press effect */
    .btn-press {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-press:active {
      transform: scale(0.96) !important;
    }

    /* Touch ripple */
    .ripple-container {
      position: relative;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: rippleEffect 0.5s linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Mobile dock active indicator */
    .dock-active {
      position: relative;
    }

    .dock-active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      box-shadow: 0 0 8px rgba(236, 72, 153, 0.6);
    }

    /* Card hover glow */
    .card-glow {
      transition: box-shadow 0.4s ease, transform 0.4s ease, border-color 0.4s ease;
    }

    @media (hover: hover) {
      .card-glow:hover {
        box-shadow: 0 20px 50px rgba(236, 72, 153, 0.12);
        transform: translateY(-4px);
      }
    }

    /* Compact mobile styles */
    @media (max-width: 768px) {
      .mobile-compact-text {
        font-size: 0.875rem;
      }

      .mobile-compact-heading {
        font-size: 1.75rem;
      }

      .mobile-tight-spacing {
        padding-top: 3rem;
        padding-bottom: 3rem;
      }
    }

    /* Smooth page transitions */
    .page-enter {
      animation: fadeInBlur 0.35s ease-out forwards;
    }

    /* Shimmer skeleton effect */
    .skeleton-shimmer {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
    }

    .skeleton-shimmer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      animation: shimmer 1.5s ease-in-out infinite;
    }

    /* Safe area padding for notched devices */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* Input focus glow */
    input:focus,
    textarea:focus {
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.3);
    }

    /* Slide-up animation class */
    .animate-slide-up {
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Animated gradient border */
    .gradient-border {
      position: relative;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.4), rgba(168, 85, 247, 0.4));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ===== Vibrant Home Animations ===== */

    /* Particle drift paths — 4 unique organic curves */
    @keyframes particleDrift1 {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(15px, -25px); }
      40% { transform: translate(-10px, -55px); }
      60% { transform: translate(20px, -35px); }
      80% { transform: translate(-5px, -15px); }
    }
    @keyframes particleDrift2 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-20px, -18px); }
      50% { transform: translate(12px, -45px); }
      75% { transform: translate(-15px, -22px); }
    }
    @keyframes particleDrift3 {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(18px, -12px); }
      45% { transform: translate(-8px, -38px); }
      70% { transform: translate(22px, -50px); }
      90% { transform: translate(5px, -10px); }
    }
    @keyframes particleDrift4 {
      0%, 100% { transform: translate(0, 0); }
      30% { transform: translate(-12px, -30px); }
      60% { transform: translate(8px, -58px); }
      85% { transform: translate(-18px, -20px); }
    }
    @keyframes particlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Orb drifts — slow, organic lissajous-like paths */
    @keyframes orbDrift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      20% { transform: translate(4vw, 3vh) scale(1.06); }
      40% { transform: translate(8vw, -2vh) scale(0.97); }
      60% { transform: translate(3vw, 6vh) scale(1.04); }
      80% { transform: translate(-2vw, 2vh) scale(0.98); }
    }
    @keyframes orbDrift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-5vw, -3vh) scale(1.05); }
      50% { transform: translate(-2vw, -7vh) scale(0.96); }
      75% { transform: translate(-6vw, -1vh) scale(1.03); }
    }
    @keyframes orbDrift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      30% { transform: translate(3vw, -4vh) scale(1.08); }
      60% { transform: translate(-4vw, 3vh) scale(0.94); }
      85% { transform: translate(2vw, -1vh) scale(1.02); }
    }
    @keyframes orbBreath {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }

    /* Shimmer sweeps — focused highlight that travels across */
    @keyframes shimmerSweep {
      0% { transform: translateX(-60%) rotate(var(--rotation, -8deg)); }
      100% { transform: translateX(60%) rotate(var(--rotation, -8deg)); }
    }
    @keyframes shimmerSweepV {
      0% { transform: translateY(-60%); }
      100% { transform: translateY(60%); }
    }

    @keyframes marqueeScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .animate-marquee {
      animation: marqueeScroll 30s linear infinite;
      width: max-content;
    }

    /* Aurora wave — horizontal drift */
    @keyframes auroraWave1 {
      0%, 100% { transform: translateX(-15%) skewY(-2deg); }
      50% { transform: translateX(15%) skewY(2deg); }
    }
    @keyframes auroraWave2 {
      0%, 100% { transform: translateX(10%) skewY(1deg); }
      50% { transform: translateX(-10%) skewY(-1deg); }
    }

    /* Twinkling stars */
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Diamond float paths */
    @keyframes diamondFloat1 {
      0%, 100% { transform: rotate(45deg) translate(0, 0); }
      25% { transform: rotate(135deg) translate(20px, -30px); }
      50% { transform: rotate(225deg) translate(-10px, -50px); }
      75% { transform: rotate(315deg) translate(15px, -20px); }
    }
    @keyframes diamondFloat2 {
      0%, 100% { transform: rotate(45deg) translate(0, 0); }
      30% { transform: rotate(180deg) translate(-25px, -15px); }
      60% { transform: rotate(270deg) translate(10px, -40px); }
      85% { transform: rotate(360deg) translate(-5px, -10px); }
    }
    @keyframes diamondFloat3 {
      0%, 100% { transform: rotate(45deg) translate(0, 0); }
      20% { transform: rotate(100deg) translate(15px, -35px); }
      50% { transform: rotate(200deg) translate(-20px, -25px); }
      80% { transform: rotate(340deg) translate(10px, -45px); }
    }

    /* Meteor shoot — diagonal streak across viewport */
    @keyframes meteorShoot {
      0% { transform: rotate(-35deg) translateX(-100px); opacity: 0; }
      5% { opacity: 1; }
      30% { opacity: 1; }
      100% { transform: rotate(-35deg) translateX(calc(100vw + 200px)); opacity: 0; }
    }

    /* Ring expand — grows and fades out from hero center */
    @keyframes ringExpand {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      .animate-marquee,
      [style*="animation"] {
        animation-play-state: paused !important;
      }
    }

    /* ===================================================================
       LIGHT THEME — "Ivory Bloom"
       Warm ivory base, frosted white glass, deep rose & violet accents
       =================================================================== */

    /* Smooth transition for theme switching */
    html { transition: background-color 0.4s ease, color 0.4s ease; }

    /* ---- Body & root-level overrides ---- */
    [data-theme="light"] body {
      background-color: #faf7f2 !important;
      color: #1f1217 !important;
    }

    [data-theme="light"] .nebula-bg {
      background:
        radial-gradient(circle at 20% 30%, rgba(190, 24, 93, 0.04), transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.04), transparent 35%) !important;
    }

    /* ---- Glass morphism — frosted white ---- */
    [data-theme="light"] .glass-panel {
      background: rgba(255, 255, 255, 0.75) !important;
      border-color: rgba(0, 0, 0, 0.07) !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05) !important;
      backdrop-filter: blur(40px) !important;
      -webkit-backdrop-filter: blur(40px) !important;
    }

    /* ---- Gradients ---- */
    [data-theme="light"] .orchid-gradient {
      background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%) !important;
    }
    [data-theme="light"] .orchid-text-gradient {
      background: linear-gradient(to right, #be185d, #7c3aed) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }
    [data-theme="light"] .gradient-border::before {
      background: linear-gradient(135deg, rgba(190, 24, 93, 0.25), rgba(124, 58, 237, 0.25)) !important;
    }

    /* ---- Text color inversions ---- */
    [data-theme="light"] .text-white { color: #1f1217 !important; }
    [data-theme="light"] .text-gray-100 { color: #2d1f25 !important; }
    [data-theme="light"] .text-gray-200 { color: #3d2f35 !important; }
    [data-theme="light"] .text-gray-300 { color: #5a4a52 !important; }
    [data-theme="light"] .text-gray-400 { color: #6b5c63 !important; }
    [data-theme="light"] .text-gray-500 { color: #8a7b83 !important; }
    [data-theme="light"] .text-gray-600 { color: #a09498 !important; }
    [data-theme="light"] .text-gray-700 { color: #b8adb2 !important; }

    /* Keep explicit white text white where it overlays images */
    [data-theme="light"] [class*="absolute"] .text-white,
    [data-theme="light"] .orchid-gradient .text-white,
    [data-theme="light"] [class*="bg-gradient"] .text-white {
      color: #ffffff !important;
    }

    /* ---- Background color inversions ---- */
    [data-theme="light"] .bg-pudava-bg { background-color: #faf7f2 !important; }
    [data-theme="light"] .bg-pudava-surface { background-color: #ffffff !important; }
    [data-theme="light"] .bg-pudava-bg\/90 { background-color: rgba(250, 247, 242, 0.9) !important; }
    [data-theme="light"] .bg-pudava-bg\/95 { background-color: rgba(250, 247, 242, 0.95) !important; }

    /* Hardcoded dark hex backgrounds */
    [data-theme="light"] .bg-\[\#05010d\] { background-color: #faf7f2 !important; }
    [data-theme="light"] .bg-\[\#0d041a\] { background-color: #ffffff !important; }
    [data-theme="light"] .bg-\[\#0a0118\] { background-color: #f5f0eb !important; }
    [data-theme="light"] .bg-\[\#05010d\]\/60 { background-color: rgba(250, 247, 242, 0.5) !important; }

    /* White-opacity backgrounds → dark-opacity */
    [data-theme="light"] .bg-white\/5 { background-color: rgba(0, 0, 0, 0.03) !important; }
    [data-theme="light"] .bg-white\/10 { background-color: rgba(0, 0, 0, 0.04) !important; }
    [data-theme="light"] .bg-white\/20 { background-color: rgba(0, 0, 0, 0.06) !important; }
    [data-theme="light"] .bg-white\/\[0\.02\] { background-color: rgba(0, 0, 0, 0.015) !important; }
    [data-theme="light"] .bg-white\/\[0\.04\] { background-color: rgba(0, 0, 0, 0.025) !important; }

    /* Black-opacity backgrounds → lighter */
    [data-theme="light"] .bg-black\/30 { background-color: rgba(0, 0, 0, 0.06) !important; }
    [data-theme="light"] .bg-black\/60 { background-color: rgba(0, 0, 0, 0.15) !important; }
    [data-theme="light"] .bg-black\/70 { background-color: rgba(0, 0, 0, 0.2) !important; }

    /* Surface/50 for footer */
    [data-theme="light"] .bg-pudava-surface\/50 { background-color: rgba(255, 255, 255, 0.6) !important; }

    /* ---- Border inversions ---- */
    [data-theme="light"] .border-white\/5 { border-color: rgba(0, 0, 0, 0.06) !important; }
    [data-theme="light"] .border-white\/10 { border-color: rgba(0, 0, 0, 0.08) !important; }
    [data-theme="light"] .border-white\/20 { border-color: rgba(0, 0, 0, 0.1) !important; }
    [data-theme="light"] .border-l-white\/5 { border-left-color: rgba(0, 0, 0, 0.06) !important; }

    /* ---- Gradient overlays on images — keep dark for readability ---- */
    [data-theme="light"] .from-\[\#05010d\] { --tw-gradient-from: rgba(31, 18, 23, 0.9) !important; }
    [data-theme="light"] .from-\[\#05010d\]\/80 { --tw-gradient-from: rgba(31, 18, 23, 0.65) !important; }
    [data-theme="light"] .to-\[\#05010d\] { --tw-gradient-to: #faf7f2 !important; }

    /* ---- Shadow adjustments ---- */
    [data-theme="light"] .shadow-2xl { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08) !important; }
    [data-theme="light"] .shadow-xl { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06) !important; }
    [data-theme="light"] .shadow-black\/60 { --tw-shadow-color: rgba(0, 0, 0, 0.08) !important; }

    /* Card glow — subtle warm glow */
    @media (hover: hover) {
      [data-theme="light"] .card-glow:hover {
        box-shadow: 0 12px 40px rgba(190, 24, 93, 0.08) !important;
      }
    }

    /* ---- Input overrides ---- */
    [data-theme="light"] input,
    [data-theme="light"] textarea,
    [data-theme="light"] select {
      color: #1f1217 !important;
    }
    [data-theme="light"] input::placeholder,
    [data-theme="light"] textarea::placeholder {
      color: #a09498 !important;
    }
    [data-theme="light"] input:focus,
    [data-theme="light"] textarea:focus {
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2) !important;
    }

    /* ---- Button overrides ---- */
    /* Primary button: white-on-dark becomes dark-on-white */
    [data-theme="light"] .bg-white.text-black {
      background-color: #1f1217 !important;
      color: #ffffff !important;
    }
    [data-theme="light"] .bg-white.text-black:hover {
      background-color: #2d1f25 !important;
    }

    /* ---- Scrollbar (for webkit browsers) ---- */
    [data-theme="light"] ::-webkit-scrollbar { width: 8px; }
