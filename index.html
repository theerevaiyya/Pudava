<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pudava | Royal Ethnic Wear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pudava: {
                bg: '#05010d', // Darker Obsidian
                surface: '#0d041a',
                primary: '#ec4899',
                secondary: '#a855f7',
                accent: '#d946ef',
                glass: 'rgba(255, 255, 255, 0.02)',
                glassBorder: 'rgba(217, 70, 239, 0.12)',
              },
              fontFamily: {
                sans: ['DM Sans', 'sans-serif'],
                serif: ['Playfair Display', 'serif'],
              },
              animation: {
                'reveal-text': 'revealText 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards',
                'fade-in-blur': 'fadeInBlur 0.8s ease-out forwards',
                'float-slow': 'float 8s ease-in-out infinite',
                'nebula-pulse': 'nebula 10s ease-in-out infinite',
                'scale-up': 'scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              },
              keyframes: {
                revealText: {
                  '0%': { transform: 'translateY(100%)', clipPath: 'inset(0 0 100% 0)' },
                  '100%': { transform: 'translateY(0)', clipPath: 'inset(0 0 0 0)' },
                },
                fadeInBlur: {
                  '0%': { opacity: '0', filter: 'blur(20px)', transform: 'scale(0.95)' },
                  '100%': { opacity: '1', filter: 'blur(0)', transform: 'scale(1)' },
                },
                float: {
                  '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                  '50%': { transform: 'translateY(-20px) rotate(1deg)' },
                },
                nebula: {
                  '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
                  '50%': { opacity: '0.6', transform: 'scale(1.1)' },
                },
                scaleUp: {
                  '0%': { transform: 'scale(0.8)', opacity: '0' },
                  '100%': { transform: 'scale(1)', opacity: '1' },
                }
              }
            },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'DM Sans', sans-serif;
        background-color: #05010d;
        color: #f3f4f6;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      .nebula-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(circle at 20% 30%, rgba(236, 72, 153, 0.08), transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.08), transparent 40%);
        pointer-events: none;
      }

      .glass-panel {
        background: rgba(13, 4, 26, 0.6);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }

      .orchid-gradient {
        background: linear-gradient(135deg, #f472b6 0%, #a855f7 100%);
      }

      .orchid-text-gradient {
        background: linear-gradient(to right, #f9a8d4, #d8b4fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .parallax-img {
        transition: transform 0.8s cubic-bezier(0.33, 1, 0.68, 1);
      }

      .group:hover .parallax-img {
        transform: scale(1.08) translateY(-10px);
      }

      .stagger-in > * {
        opacity: 0;
        animation: scaleUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Hide Scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .reveal-container {
        overflow: hidden;
      }
      
      .reveal-item {
        display: inline-block;
        animation: revealText 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="nebula-bg animate-nebula-pulse"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
